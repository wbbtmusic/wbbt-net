server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Cache Control for Static Assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # SEO 301 Redirects for Old Wix/Subdomain URLs
    location ~ ^/category/.* {
        return 301 $scheme://$server_name/;
    }
    
    location ~ ^/product-page/.* {
        return 301 $scheme://$server_name/services;
    }
    
    location = /contact-8 {
        return 301 $scheme://$server_name/submit;
    }

    location = /favicon.ico {
        # Silent 204 or return the actual icon. Assuming it's in public handling.
        try_files /favicon.ico =204;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache Control for Static Assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }
}
